schema_version: '2.0'
title: Koo2013 Shear-Stress Induced Calcium Influx and eNOS Activation
description: Koo et al. (2013) model of how laminar shear stress at the endothelial
  surface drives calcium influx and activates endothelial nitric oxide synthase (eNOS).
