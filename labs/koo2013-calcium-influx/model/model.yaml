- Raquel Umeton
- Brian Yankama
- Sukanya Ayyadurai
- Greg M. Fitzgerald
- Cynthia A. Stokes
upstream:
  id: biomodels_ebi:BIOMD0000000464
  source_db: biomodels_ebi
  source_id: BIOMD0000000464
