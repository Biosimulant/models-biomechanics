schema_version: '2.0'
title: Heldt2002 Orthostatic Stress - Circulation PBPK Lab
description: Heldt et al. (2002) lumped circulation model used to study cardiovascular
  response to orthostatic stress (head-up tilt and lower body negative pressure).
models:
- alias: heldt2002_orthostaticstress_circpbpk
  path: model
  parameters:
    model_path: data/MODEL1006230084.xml
    integration_step: 0.05
runtime:
  duration: 60.0
  communication_step: 1.0
  initial_inputs: {}
io:
  inputs:
  - name: compliance_scale
    maps_to: heldt2002_orthostaticstress_circpbpk.compliance_scale
  - name: heart_rate
    maps_to: heldt2002_orthostaticstress_circpbpk.heart_rate
  - name: integration_step
    maps_to: heldt2002_orthostaticstress_circpbpk.integration_step
  - name: peripheral_resistance_scale
    maps_to: heldt2002_orthostaticstress_circpbpk.peripheral_resistance_scale
  outputs:
  - name: aortic_flow
    maps_to: heldt2002_orthostaticstress_circpbpk.aortic_flow
  - name: aortic_pressure
    maps_to: heldt2002_orthostaticstress_circpbpk.aortic_pressure
  - name: state
    maps_to: heldt2002_orthostaticstress_circpbpk.state
  - name: summary
    maps_to: heldt2002_orthostaticstress_circpbpk.summary
wiring: []
