schema_version: "2.0"
title: "Heldt2002 Orthostatic Stress - Circulation PBPK Visualisation"
description: "Dedicated presentation model for the Heldt2002 circulation PBPK lab."
standard: other
tags:
  - biomechanics
  - visualisation
  - heldt2002
authors:
  - "Biosimulant Team"
biosim:
  entrypoint: "src.biomechanics_visualisation:BiomechanicsVisualisationModel"
  init_kwargs:
    integration_step: 1.0
    lab_title: "Heldt2002 Orthostatic Stress - Circulation PBPK Lab"
    sources:
      - alias: heldt2002_orthostaticstress_circpbpk
        observable_strategy: rateRule
        phase_portrait:
          title: "LV pressure-volume loop"
          description: "Pressure-volume loop reconstructed from the latest cycle."
          x_key: phase_x
          y_key: phase_y
          x_label: "LV volume"
          y_label: "LV pressure"
          x_unit: "mL"
          y_unit: "mmHg"
          series: "LV cycle"
  communication_step: 1.0
parameters:
  - name: integration_step
    value: 1.0
    min: 0.0
    units: "s"
    description: "Sampling step for the visualisation model."
io:
  inputs: []
  outputs: []
