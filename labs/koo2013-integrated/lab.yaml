description: Koo et al. (2013) integrated endothelial mechanotransduction model combining shear-stress sensing, calcium influx, eNOS activation, and NO production into a single ODE system.
io:
  inputs:
  - maps_to: koo2013_integrated_shear_stress_no_production.integration_step
    name: integration_step
  - maps_to: koo2013_integrated_shear_stress_no_production.stimulus_intensity
    name: stimulus_intensity
  outputs:
  - maps_to: koo2013_integrated_shear_stress_no_production.active_eNOS
    name: active_eNOS
  - maps_to: koo2013_integrated_shear_stress_no_production.cytosolic_calcium
    name: cytosolic_calcium
  - maps_to: koo2013_integrated_shear_stress_no_production.nitric_oxide
    name: nitric_oxide
  - maps_to: koo2013_integrated_shear_stress_no_production.state
    name: state
  - maps_to: koo2013_integrated_shear_stress_no_production.summary
    name: summary
models:
- alias: koo2013_integrated_shear_stress_no_production
  parameters:
    integration_step: 1
    model_path: data/BIOMD0000000468.xml
  path: models/core
- alias: visualisation
  path: models/visualisation
runtime:
  communication_step: 10
  duration: 600
  initial_inputs: {}
schema_version: '2.0'
title: Koo2013 Integrated Shear-Stress Induced NO Production Lab
wiring:
- from: koo2013_integrated_shear_stress_no_production.active_eNOS
  to:
  - visualisation.koo2013_integrated_shear_stress_no_production_active_eNOS
- from: koo2013_integrated_shear_stress_no_production.cytosolic_calcium
  to:
  - visualisation.koo2013_integrated_shear_stress_no_production_cytosolic_calcium
- from: koo2013_integrated_shear_stress_no_production.nitric_oxide
  to:
  - visualisation.koo2013_integrated_shear_stress_no_production_nitric_oxide
- from: koo2013_integrated_shear_stress_no_production.state
  to:
  - visualisation.koo2013_integrated_shear_stress_no_production_state
- from: koo2013_integrated_shear_stress_no_production.summary
  to:
  - visualisation.koo2013_integrated_shear_stress_no_production_summary
