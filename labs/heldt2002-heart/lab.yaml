schema_version: '2.0'
title: Heldt2002 Orthostatic Stress - Heart Lab
description: Heldt et al. (2002) cardiac submodel for the orthostatic-stress cardiovascular
  system, isolating contraction-driven ventricular dynamics.
models:
- alias: heldt2002_orthostaticstress_heart
  path: model
  parameters:
    model_path: data/MODEL1006230103.xml
    integration_step: 0.01
runtime:
  duration: 5.0
  communication_step: 0.5
  initial_inputs: {}
io:
  inputs:
  - name: diastolic_elastance
    maps_to: heldt2002_orthostaticstress_heart.diastolic_elastance
  - name: heart_rate
    maps_to: heldt2002_orthostaticstress_heart.heart_rate
  - name: integration_step
    maps_to: heldt2002_orthostaticstress_heart.integration_step
  - name: systolic_elastance
    maps_to: heldt2002_orthostaticstress_heart.systolic_elastance
  outputs:
  - name: elastance
    maps_to: heldt2002_orthostaticstress_heart.elastance
  - name: state
    maps_to: heldt2002_orthostaticstress_heart.state
  - name: summary
    maps_to: heldt2002_orthostaticstress_heart.summary
wiring: []
